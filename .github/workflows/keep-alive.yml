# .github/workflows/keep-alive.yml
name: Keep Render Awake
on:
  schedule:
    - cron: '*/10 * * * *'
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    if: github.event.schedule == '*/10 * * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Ping server
        run: curl -sv https://market-pulse-1-oe02.onrender.com/api/ping

  refresh-reddit:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 13 * * *'
    steps:
      - name: Refresh Reddit news cache
        run: curl -sv -X POST https://market-pulse-1-oe02.onrender.com/api/news/reddit/refresh
